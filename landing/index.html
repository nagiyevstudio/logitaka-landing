<!doctype html>
<html lang="az">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logitaka</title>
  <link rel="icon" type="image/svg+xml" href="./assets/logo-logitaka-bb.svg" />
  <meta name="description"
    content="Logitaka turns scattered inputs into a coherent system that becomes more useful as the pieces come together." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f0ede9;
      --surface: rgba(249, 248, 246, 0.72);
      --surface-strong: rgba(249, 248, 246, 0.96);
      --surface-dim: rgba(235, 232, 228, 0.55);
      --text: #1e2a30;
      --muted: #6e808d;
      --faint: #9aabb5;
      --line: rgba(54, 69, 79, 0.08);
      --line-strong: rgba(54, 69, 79, 0.16);
      --accent: #ff4500;
      --accent-strong: #ff5a1f;
      --accent-dim: rgba(255, 69, 0, 0.12);
      --accent-text: #fff;
      --shadow-soft: 0 2px 16px rgba(17, 19, 24, 0.06), 0 8px 40px -12px rgba(17, 19, 24, 0.1);
      --shadow-card: 0 1px 4px rgba(17, 19, 24, 0.04), 0 4px 20px -4px rgba(17, 19, 24, 0.08);
      --shadow-accent: 0 0 32px rgba(255, 69, 0, 0.22), 0 4px 24px -4px rgba(255, 69, 0, 0.35);
      --max-width: 1240px;
      --header-height: 68px;
    }

    body[data-theme='dark'] {
      --bg: #0d1117;
      --surface: rgba(22, 27, 34, 0.72);
      --surface-strong: rgba(30, 37, 47, 0.96);
      --surface-dim: rgba(14, 18, 24, 0.55);
      --text: #e8edf2;
      --muted: #8897a4;
      --faint: #5a6a76;
      --line: rgba(176, 188, 199, 0.1);
      --line-strong: rgba(176, 188, 199, 0.18);
      --shadow-soft: 0 2px 16px rgba(0, 0, 0, 0.3), 0 8px 40px -12px rgba(0, 0, 0, 0.5);
      --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.25), 0 4px 20px -4px rgba(0, 0, 0, 0.4);
      --shadow-accent: 0 0 48px rgba(255, 69, 0, 0.3), 0 4px 28px -4px rgba(255, 69, 0, 0.45);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 320px;
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      color: var(--text);
      background: var(--bg);
      transition: background 200ms ease, color 200ms ease;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(255, 69, 0, 0.09), transparent),
        radial-gradient(ellipse 60% 50% at 85% 10%, rgba(255, 69, 0, 0.06), transparent),
        radial-gradient(ellipse 40% 40% at 60% 90%, rgba(255, 69, 0, 0.04), transparent);
    }

    /* Grid overlay — only top portion */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.25) 0%, transparent 40%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    p {
      margin: 0;
    }

    .site-shell {
      position: relative;
      z-index: 1;
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      height: var(--header-height);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      background: color-mix(in srgb, var(--bg) 75%, transparent);
      border-bottom: 1px solid var(--line);
      transition: box-shadow 200ms ease;
    }

    .site-header.scrolled {
      box-shadow: 0 1px 24px rgba(0, 0, 0, 0.08);
    }

    .header-inner,
    .section-inner,
    .footer-inner {
      width: min(calc(100% - 48px), var(--max-width));
      margin: 0 auto;
    }

    .header-inner {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    /* Brand */
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      text-decoration: none;
    }

    .brand-logo {
      height: 28px;
      width: auto;
      display: block;
    }

    body[data-theme='dark'] .brand-logo-light {
      display: none;
    }

    body[data-theme='dark'] .brand-logo-dark {
      display: block;
    }

    body:not([data-theme='dark']) .brand-logo-dark {
      display: none;
    }

    body:not([data-theme='dark']) .brand-logo-light {
      display: block;
    }

    .brand-name-group {
      display: flex;
      flex-direction: column;
      gap: 1px;
      line-height: 1;
    }

    .brand-name {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .brand-tagline {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
    }

    /* Nav */
    .header-nav {
      flex: 1;
      min-width: 0;
    }

    .header-nav-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .header-nav-list::-webkit-scrollbar {
      display: none;
    }

    .header-nav-list a {
      white-space: nowrap;
      color: var(--muted);
      font-size: 0.88rem;
      padding: 6px 10px;
      transition: color 150ms ease, background 150ms ease;
    }

    .header-nav-list a:hover {
      color: var(--text);
      background: var(--accent-dim);
    }

    /* ─── LAYOUT ─────────────────────────────────────────────── */
    main {
      padding-bottom: 96px;
    }

    section {
      padding: 72px 0;
    }

    section+section .section-inner {
      position: relative;
    }

    section+section .section-inner::before {
      content: '';
      position: absolute;
      top: -72px;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--line);
    }

    .section-inner {
      display: grid;
      gap: 32px;
    }

    .section-eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-kicker {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.68rem;
      font-weight: 700;
    }

    .section-kicker-line {
      height: 1px;
      width: 32px;
      background: var(--accent);
      opacity: 0.5;
    }

    .section-title {
      margin: 0;
      font-size: clamp(2.2rem, 4.5vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.055em;
      font-weight: 700;
    }

    .section-title.medium {
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .section-copy {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .section-text {
      display: grid;
      gap: 16px;
    }

    .section-text p {
      color: var(--muted);
      line-height: 1.7;
    }

    /* ─── HERO ───────────────────────────────────────────────── */
    .hero {
      padding-top: 80px;
      padding-bottom: 0;
      border-top: none;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('./assets/hero-bg.png') center center / cover no-repeat;
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
    }

    .hero .section-inner {
      position: relative;
      z-index: 1;
      gap: 0;
    }

    .hero-content {
      display: grid;
      gap: 28px;
      padding-bottom: 64px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px 6px 8px;
      border: 1px solid var(--line-strong);
      background: var(--surface);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      width: fit-content;
    }

    .hero-eyebrow-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    .hero-headline {
      margin: 0;
      font-size: clamp(3rem, 7vw, 6.5rem);
      line-height: 0.9;
      letter-spacing: -0.055em;
      font-weight: 700;
    }

    .hero-headline em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-subheadline {
      max-width: 52ch;
      color: var(--muted);
      font-size: clamp(1.05rem, 1.8vw, 1.2rem);
      line-height: 1.65;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--line-strong);
      background: var(--surface);
      overflow: hidden;
    }

    .stat-item {
      padding: 20px 24px;
      display: grid;
      gap: 4px;
    }

    .stat-item+.stat-item {
      border-left: 1px solid var(--line);
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .stat-label {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* Hero visual panel */
    .hero-visual-panel {
      border-top: 1px solid var(--line);
      margin: 0 calc(-1 * (100vw - min(calc(100% - 48px), var(--max-width))) / 2);
      padding: 0 calc((100vw - min(calc(100% - 48px), var(--max-width))) / 2);
      background: var(--surface-dim);
      overflow: hidden;
      position: relative;
    }

    .hero-visual-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 69, 0, 0.06) 0%, transparent 50%),
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 100% 100%, 44px 44px, 44px 44px;
    }

    .hero-visual-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      background: var(--line-strong);
    }

    .visual-flow-card {
      padding: 28px 24px;
      background: var(--bg);
      display: grid;
      gap: 12px;
      transition: background 200ms ease;
    }

    [data-theme='dark'] .visual-flow-card {
      background: var(--bg);
    }

    .visual-flow-card:hover {
      background: color-mix(in srgb, var(--bg) 85%, var(--accent));
    }

    .visual-flow-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--accent);
      font-size: 1.4rem;
      opacity: 0.4;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }

    .vfc-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .vfc-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .vfc-body {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .vfc-dots {
      display: flex;
      gap: 5px;
      margin-top: 4px;
    }

    .vfc-dot {
      width: 5px;
      height: 5px;
      background: var(--accent);
      opacity: 0.3;
    }

    .vfc-dot.active {
      opacity: 1;
    }

    /* ─── PANELS / CARDS ─────────────────────────────────────── */
    .panel,
    .pricing-card,
    .faq-item,
    .cta-panel {
      background: var(--surface);
      border: 1px solid var(--line-strong);
    }

    .panel {
      padding: 24px;
      display: grid;
      gap: 14px;
      min-height: 100%;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    .panel:hover {
      border-color: rgba(255, 69, 0, 0.25);
      box-shadow: var(--shadow-card);
    }

    .panel-index {
      color: var(--accent);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 700;
      opacity: 0.7;
    }

    .panel-title {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.25;
      font-weight: 600;
    }

    .panel-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.93rem;
    }

    /* Cards grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .cards-grid.wide {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    /* Split */
    .split-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 24px;
    }

    /* Bullet list */
    .bullet-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .bullet-list li {
      position: relative;
      padding-left: 24px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .bullet-list li::before {
      content: '';
      position: absolute;
      top: 0.65em;
      left: 0;
      width: 12px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .quote-panel .bullet-list {
      gap: 8px;
    }

    .quote-panel .bullet-list li {
      line-height: 1.4;
      font-size: 0.88rem;
    }

    .context-models-line {
      margin-top: 20px;
      color: var(--faint);
      font-size: 0.83rem;
    }

    /* Quote */
    .quote-panel {
      padding: 24px 28px;
      border-left: 2px solid var(--accent);
      background: var(--surface);
      box-shadow: var(--shadow-card);
    }

    .transformation-visual-slot {
      min-height: 480px;
      background: var(--surface-dim);
    }

    .dev-team-grid {
      grid-template-columns: 1fr 1.2fr;
    }

    .dev-team-visual-slot {
      min-height: 560px;
      border: 1px dashed var(--line-strong);
      background: var(--surface-dim);
    }

    .quote-signature {
      margin-top: 16px;
      color: var(--faint);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }


    /* ─── BUTTONS ────────────────────────────────────────────── */
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 24px;
      border: 1px solid transparent;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 160ms ease,
        background 160ms ease,
        opacity 160ms ease;
      position: relative;
      overflow: hidden;
    }

    .button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.08);
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button:hover::after {
      opacity: 1;
    }

    .button:active {
      transform: translateY(0);
    }

    .button-solid {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 1px 3px rgba(255, 69, 0, 0.25), 0 4px 20px -4px rgba(255, 69, 0, 0.4);
    }

    .button-solid:hover {
      box-shadow: var(--shadow-accent);
    }

    .button-ghost {
      color: var(--text);
      background: transparent;
      border-color: var(--line-strong);
    }

    .button-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .cta-notice {
      font-size: 0.72rem;
      color: var(--faint);
      margin-top: 4px;
      text-align: left;
      max-width: 320px;
      line-height: 1.4;
    }

    .cta-notice a {
      color: var(--muted);
      text-decoration: underline;
      transition: color 150ms ease;
    }

    .cta-notice a:hover {
      color: var(--accent);
    }

    /* ─── MODEL TEASER ───────────────────────────────────────── */
    .model-teaser-visual {
      position: relative;
      min-height: 440px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
    }

    .teaser-card {
      padding: 24px;
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow-card);
      width: 100%;
      max-width: 340px;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: absolute;
    }

    .teaser-card-light {
      background: var(--surface-strong);
      color: var(--text);
      top: 10%;
      left: 0;
      z-index: 1;
      border-left: 4px solid #4caf50;
    }

    .teaser-card-dark {
      background: #1e2a30;
      color: #fff;
      bottom: 10%;
      right: 0;
      z-index: 2;
      border-left: 4px solid var(--accent);
      transform: translateX(40px);
    }

    [data-theme='dark'] .teaser-card-light {
      background: #2d3748;
    }

    [data-theme='dark'] .teaser-card-dark {
      background: #000;
      border-color: var(--line-strong);
    }

    .teaser-card:hover {
      transform: scale(1.05) translateY(-8px) rotate(1deg);
      z-index: 3;
    }

    .teaser-card-dark:hover {
      transform: translateX(40px) scale(1.05) translateY(-8px) rotate(-1deg);
    }

    .teaser-card-title {
      font-weight: 700;
      font-size: 1.15rem;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .teaser-card-desc {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .teaser-card-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .teaser-card-light .teaser-card-badge {
      background: rgba(76, 175, 80, 0.1);
      color: #4caf50;
    }

    .teaser-card-dark .teaser-card-badge {
      background: rgba(255, 69, 0, 0.15);
      color: #ff5a1f;
    }

    .teaser-visual-arrow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--faint);
      opacity: 0.2;
      font-size: 3rem;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 1024px) {
      .teaser-card-dark {
        transform: translateX(20px);
      }
      .teaser-card-dark:hover {
        transform: translateX(20px) scale(1.05) translateY(-8px);
      }
    }

    @media (max-width: 900px) {
      .model-teaser-visual {
        min-height: auto;
        padding: 40px 0;
        gap: 24px;
        align-items: center;
      }
      .teaser-card {
        position: relative;
        top: auto;
        left: auto;
        right: auto;
        bottom: auto;
        transform: none !important;
        max-width: 100%;
      }
      .teaser-visual-arrow {
        display: none;
      }
    }

    /* ─── PRICING ────────────────────────────────────────────── */
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .pricing-card {
      padding: 36px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 460px;
      position: relative;
      transition: transform 200ms ease, box-shadow 200ms ease;
    }

    .pricing-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-soft);
    }

    .pricing-card.is-featured {
      background: var(--surface-strong);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(255, 69, 0, 0.2), 0 8px 40px -8px rgba(255, 69, 0, 0.25);
      z-index: 1;
      transform: scale(1.02);
    }

    .pricing-card.is-featured:hover {
      transform: scale(1.02) translateY(-3px);
    }

    .pricing-badge {
      display: none;
    }

    .pricing-card.is-featured .pricing-badge {
      display: inline-flex;
      position: absolute;
      top: 0;
      right: 0;
      align-items: center;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 5px 12px;
      background: var(--accent);
      color: white;
    }

    .pricing-card .panel-index {
      margin-bottom: 8px;
    }

    .pricing-name {
      margin: 0 0 20px;
      font-size: 1.25rem;
      font-weight: 700;
    }

    .pricing-price {
      margin: 0 0 24px;
      font-size: 2.6rem;
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 700;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .pricing-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.92rem;
      flex: 1;
    }

    .pricing-card-footer {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pricing-beta-note {
      color: var(--faint);
      font-size: 0.76rem;
      line-height: 1.5;
    }

    .pricing-note {
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.9rem;
    }

    /* ─── VALUE STACK ────────────────────────────────────────── */
    .value-stack-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .value-stack-table {
      background: var(--surface);
      border: 1px solid var(--line-strong);
      overflow: hidden;
    }

    .vst-header {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line-strong);
      background: var(--surface-dim);
    }

    .vst-header span {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .vst-header span:nth-child(2),
    .vst-header span:nth-child(3) {
      text-align: right;
    }

    .vst-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--line);
      align-items: center;
      transition: background 150ms ease;
    }

    .vst-row:last-child {
      border-bottom: none;
    }

    .vst-row:hover {
      background: var(--accent-dim);
    }

    .vst-name {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .vst-provider {
      display: block;
      font-size: 0.72rem;
      color: var(--faint);
      margin-top: 2px;
      font-weight: 500;
    }

    .vst-price-usd {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .vst-price-azn {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      text-align: right;
      white-space: nowrap;
    }

    .vst-total-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 16px 20px;
      background: color-mix(in srgb, var(--surface) 60%, var(--accent-dim));
      border-top: 2px solid var(--line-strong);
      align-items: center;
    }

    .vst-total-label {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .vst-total-usd {
      font-size: 0.9rem;
      color: var(--muted);
      text-align: right;
      text-decoration: line-through;
      text-decoration-color: var(--accent);
    }

    .vst-total-azn {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      text-align: right;
      text-decoration: line-through;
      text-decoration-color: var(--accent);
    }

    /* Right panel */
    .value-stack-panel {
      position: sticky;
      top: calc(var(--header-height) + 24px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .vsp-vs {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--faint);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .vsp-vs::before,
    .vsp-vs::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line-strong);
    }

    .vsp-savings {
      background: var(--surface);
      border: 1px solid var(--line-strong);
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .vsp-savings-old {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .vsp-old-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .vsp-old-price {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--accent);
      text-decoration-thickness: 3px;
    }

    .vsp-divider {
      height: 1px;
      background: var(--line);
    }

    .vsp-savings-new {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .vsp-new-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .vsp-new-price {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 1;
      color: var(--text);
    }

    .vsp-new-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .vsp-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .vsp-badge-icon {
      font-size: 1rem;
    }

    .vst-disclaimer {
      color: var(--faint);
      font-size: 0.74rem;
      line-height: 1.55;
      margin-top: 8px;
    }

    @media (max-width: 1040px) {
      .value-stack-grid {
        grid-template-columns: 1fr;
      }
      .value-stack-panel {
        position: static;
      }
    }

    /* ─── FAQ ────────────────────────────────────────────────── */
    .faq-list {
      display: grid;
      gap: 8px;
      max-width: 820px;
    }

    .faq-item {
      overflow: hidden;
      transition: box-shadow 200ms ease;
    }

    .faq-item[open] {
      box-shadow: var(--shadow-card);
    }

    .faq-item summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      font-weight: 600;
      font-size: 0.97rem;
      user-select: none;
      transition: background 150ms ease;
    }

    .faq-item summary:hover {
      background: var(--accent-dim);
    }

    .faq-item summary::-webkit-details-marker {
      display: none;
    }

    .faq-toggle {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 0.9rem;
      transition: background 150ms ease, transform 200ms ease;
    }

    .faq-item[open] .faq-toggle {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: rotate(45deg);
    }

    .faq-answer {
      padding: 0 22px 20px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    /* ─── CTA ────────────────────────────────────────────────── */
    .cta-panel {
      padding: 48px 56px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 40px;
      align-items: center;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .cta-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(255, 69, 0, 0.07), transparent);
      pointer-events: none;
    }

    .cta-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    .footer {
      padding-top: 64px;
      padding-bottom: 48px;
    }

    .footer-inner::before {
      content: '';
      display: block;
      height: 1px;
      background: var(--line-strong);
      margin-bottom: 64px;
    }

    .footer-top {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 48px;
      padding-bottom: 40px;
    }

    .footer-brand .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .footer-tagline {
      color: var(--faint);
      font-size: 0.88rem;
      line-height: 1.6;
      max-width: 30ch;
      margin: 14px 0 0;
    }

    .footer-nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .footer-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 150ms ease;
    }

    .footer-nav a:hover {
      color: var(--text);
    }

    .footer-right {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
    }

    .footer-legal-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .footer-legal-list a {
      color: var(--faint);
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 150ms ease;
    }

    .footer-legal-list a:hover {
      color: var(--muted);
    }

    .footer-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Footer language switcher — no box, plain text buttons */
    .footer-controls .control-group {
      display: flex;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
    }

    .footer-controls .control-button {
      border: 0;
      background: transparent;
      color: var(--faint);
      padding: 4px 6px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      transition: color 150ms ease;
    }

    .footer-controls .control-button.is-active {
      color: var(--accent);
      background: transparent;
    }

    .footer-controls .control-button:hover:not(.is-active) {
      color: var(--text);
      background: transparent;
    }

    /* Theme icon button — no box, no border */
    .theme-icon-btn {
      border: 0;
      background: transparent;
      color: var(--faint);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 150ms ease;
    }

    .theme-icon-btn:hover {
      color: var(--text);
    }

    /* Show correct icon based on theme */
    body[data-theme='dark'] .theme-icon-sun {
      display: none;
    }

    body[data-theme='dark'] .theme-icon-moon {
      display: flex;
    }

    body:not([data-theme='dark']) .theme-icon-sun {
      display: flex;
    }

    body:not([data-theme='dark']) .theme-icon-moon {
      display: none;
    }

    .footer-bottom {
      padding-top: 24px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
    }

    .footer-bottom span {
      color: var(--faint);
      font-size: 0.8rem;
    }

    /* ─── UTILITIES ──────────────────────────────────────────── */
    .muted-label {
      color: var(--faint);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-weight: 700;
    }

    .visual-placeholder {
      position: relative;
      padding: 16px;
      color: var(--faint);
      font-size: 0.82rem;
      line-height: 1.5;
      font-style: italic;
      margin-top: auto;
    }

    /* Fade-in animation on scroll */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 500ms ease, transform 500ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: none;
    }

    /* Stagger delays */
    .reveal:nth-child(2) {
      transition-delay: 80ms;
    }

    .reveal:nth-child(3) {
      transition-delay: 160ms;
    }

    .reveal:nth-child(4) {
      transition-delay: 240ms;
    }

    .reveal:nth-child(5) {
      transition-delay: 320ms;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────── */
    @media (max-width: 1040px) {
      .hero-visual-inner {
        grid-template-columns: 1fr;
      }

      .split-grid {
        grid-template-columns: 1fr;
      }

      .pricing-grid {
        grid-template-columns: 1fr;
      }

      .pricing-card.is-featured {
        transform: none;
      }

      .pricing-card.is-featured:hover {
        transform: translateY(-3px);
      }

      .cta-panel {
        grid-template-columns: 1fr;
        padding: 32px 36px;
      }

      .cards-grid.wide {
        grid-template-columns: repeat(2, 1fr);
      }

      .footer-top {
        grid-template-columns: 1fr 1fr;
      }

      .footer-brand {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 768px) {
      section {
        padding: 52px 0;
      }

      .hero {
        padding-top: 52px;
      }

      .hero-content {
        padding-bottom: 40px;
      }

      .header-inner {
        gap: 16px;
      }

      .stats-bar {
        grid-template-columns: 1fr 1fr;
      }

      .stats-bar .stat-item:last-child {
        grid-column: 1/-1;
        border-left: none;
        border-top: 1px solid var(--line);
      }

      .cards-grid,
      .cards-grid.wide {
        grid-template-columns: 1fr;
      }

      .hero-visual-inner {
        grid-template-columns: 1fr;
      }

      .cta-panel {
        padding: 24px;
      }

      .faq-list {
        max-width: 100%;
      }
    }

    @media (max-width: 620px) {
      .site-header {
        height: auto;
      }

      .header-inner {
        padding: 12px 0;
        flex-wrap: wrap;
        gap: 10px;
      }

      .header-nav {
        order: 3;
        width: 100%;
      }

      .hero-headline {
        font-size: clamp(2.4rem, 10vw, 3.5rem);
      }

      .section-title {
        font-size: clamp(1.9rem, 8vw, 2.8rem);
      }

      .footer-top {
        grid-template-columns: 1fr;
      }

      .footer-brand {
        grid-column: auto;
      }
    }
  </style>
</head>

          <h2 class="section-title medium reveal" id="value-stack-title"></h2>
          <p class="section-copy reveal" id="value-stack-subtitle"></p>
          <div class="value-stack-grid reveal">
            <div>
              <div class="value-stack-table">
                <div class="vst-header">
                  <span id="vs-col-service">Service</span>
                  <span>USD</span>
                  <span>AZN</span>
                </div>
                <div id="value-stack-rows"></div>
                <div class="vst-total-row">
                  <span class="vst-total-label" id="vs-total-label"></span>
                  <span class="vst-total-usd" id="vs-total-usd"></span>
                  <span class="vst-total-azn" id="vs-total-azn"></span>
                </div>
              </div>
              <p class="vst-disclaimer" id="vs-disclaimer"></p>
            </div>
            <div class="value-stack-panel">
              <div class="vsp-vs" id="vs-label"></div>
              <div class="vsp-savings">
                <div class="vsp-savings-old">
                  <span class="vsp-old-label" id="vs-old-label"></span>
                  <span class="vsp-old-price" id="vs-old-price"></span>
                </div>
                <div class="vsp-divider"></div>
                <div class="vsp-savings-new">
                  <span class="vsp-new-label" id="vs-new-label"></span>
                  <span class="vsp-new-price" id="vs-new-price"></span>
                  <span class="vsp-new-sub" id="vs-new-sub"></span>
                </div>
              </div>
              <div class="vsp-badge">
                <span class="vsp-badge-icon">&#10003;</span>
                <span id="vs-badge-text"></span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- PRICING -->
      <section id="pricing">
        <div class="section-inner">
          <div class="section-eyebrow">
            <span class="section-kicker">05</span>
            <span class="section-kicker-line" aria-hidden="true"></span>
          </div>
          <h2 class="section-title medium reveal" id="pricing-title"></h2>
          <div class="pricing-grid" id="pricing-grid"></div>
        </div>
      </section>

      <!-- FAQ -->
      <section id="faq">
        <div class="section-inner">
          <div class="section-eyebrow">
            <span class="section-kicker">06</span>
            <span class="section-kicker-line" aria-hidden="true"></span>
          </div>
          <h2 class="section-title medium reveal" id="faq-title"></h2>
          <div class="faq-list" id="faq-list"></div>
        </div>
      </section>

      <!-- FINAL CTA -->
      <section id="final-cta">
        <div class="section-inner">
          <div class="cta-panel reveal">
            <div class="section-text">
              <h2 class="section-title medium" id="final-cta-title"></h2>
              <p id="final-cta-body"></p>
            </div>
            <div class="cta-actions">
              <a class="button button-solid" href="#" id="final-cta-primary"></a>
              <p class="cta-notice" id="final-cta-notice"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-top">
          <div class="footer-brand">
            <a class="brand" href="#hero" aria-label="Logitaka">
              <img class="brand-logo brand-logo-dark" src="./assets/logo-logitaka-bb.svg" alt="Logitaka" height="28">
              <img class="brand-logo brand-logo-light" src="./assets/logo-logitaka-wb.svg" alt="Logitaka" height="28">
              <span class="brand-name-group">
                <span class="brand-name">Logitaka</span>
                <span class="brand-tagline" id="brand-tagline-2"></span>
              </span>
            </a>
            <p class="footer-tagline" id="footer-tagline"></p>
          </div>
          <nav class="footer-nav" aria-label="Footer navigation">
            <ul id="footer-nav-list"></ul>
          </nav>
          <div class="footer-right">
            <ul class="footer-legal-list" id="footer-legal-list"></ul>
            <div class="footer-controls">
              <div id="language-switcher" aria-label="Language"></div>
              <button class="theme-icon-btn" id="theme-toggle" type="button" aria-label="Toggle theme">
                <span class="theme-icon-sun" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="square">
                    <circle cx="12" cy="12" r="4" />
                    <line x1="12" y1="2" x2="12" y2="4" />
                    <line x1="12" y1="20" x2="12" y2="22" />
                    <line x1="2" y1="12" x2="4" y2="12" />
                    <line x1="20" y1="12" x2="22" y2="12" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                  </svg>
                </span>
                <span class="theme-icon-moon" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="square">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                  </svg>
                </span>
              </button>
            </div>
          </div>
        </div>
        <div class="footer-bottom">
          <span id="footer-copyright"></span>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const SUPPORTED_LOCALES = ['ru', 'en', 'az'];
    const STORAGE_KEYS = {
      locale: 'logitaka-landing-locale',
      theme: 'logitaka-landing-theme',
    };

    const dom = {
      navLinks: document.getElementById('nav-links'),
      languageSwitcher: document.getElementById('language-switcher'),
      themeToggle: document.getElementById('theme-toggle'),
      brandTagline1: document.getElementById('brand-tagline-1'),
      brandTagline2: document.getElementById('brand-tagline-2'),
      heroKicker: document.getElementById('hero-kicker'),
      heroHeadline: document.getElementById('hero-headline'),
      heroSubheadline: document.getElementById('hero-subheadline'),
      heroVisualCards: document.getElementById('hero-visual-cards'),
      statsBar: document.getElementById('stats-bar'),
      problemTitle: document.getElementById('problem-title'),
      problemGrid: document.getElementById('problem-grid'),
      problemClosing: document.getElementById('problem-closing'),
      transformationTitle: document.getElementById('transformation-title'),
      transformationBody1: document.getElementById('transformation-body-1'),
      transformationBody2: document.getElementById('transformation-body-2'),
      transformationCoreLabel: document.getElementById('transformation-core-label'),
      transformationCoreBody: document.getElementById('transformation-core-body'),
      transformationListLabel: document.getElementById('transformation-list-label'),
      transformationList: document.getElementById('transformation-list'),
      capabilitiesTitle: document.getElementById('capabilities-title'),
      capabilitiesGrid: document.getElementById('capabilities-grid'),
      capabilitiesClosing: document.getElementById('capabilities-closing'),
      contextLabel: document.getElementById('context-label'),
      contextTitle: document.getElementById('context-title'),
      contextCopy: document.getElementById('context-copy'),
      contextClosing: document.getElementById('context-closing'),
      contextModelsLabel: document.getElementById('context-models-label'),
      contextModels: document.getElementById('context-models'),
      contextVisualPlaceholder: document.getElementById('context-visual-placeholder'),
      modelTeaserTitle: document.getElementById('model-teaser-title'),
      modelTeaserSubtitle: document.getElementById('model-teaser-subtitle'),
      modelTeaserBullets: document.getElementById('model-teaser-bullets'),
      modelTeaserCta: document.getElementById('model-teaser-cta'),
      teaserCard1Title: document.getElementById('teaser-card1-title'),
      teaserCard1Desc: document.getElementById('teaser-card1-desc'),
      teaserCard1Badge: document.getElementById('teaser-card1-badge'),
      teaserCard2Title: document.getElementById('teaser-card2-title'),
      teaserCard2Desc: document.getElementById('teaser-card2-desc'),
      teaserCard2Badge: document.getElementById('teaser-card2-badge'),
      audienceTitle: document.getElementById('audience-title'),
      audienceGrid: document.getElementById('audience-grid'),
      audienceClosing: document.getElementById('audience-closing'),
      devTeamLabel: document.getElementById('dev-team-label'),
      devTeamTitle: document.getElementById('dev-team-title'),
      devTeamCopy: document.getElementById('dev-team-copy'),
      devTeamClosing: document.getElementById('dev-team-closing'),
      devTeamVisualLabel: document.getElementById('dev-team-visual-label'),
      devTeamPoints: document.getElementById('dev-team-points'),
      devTeamVisualSlot: document.getElementById('dev-team-visual-slot'),
      pricingTitle: document.getElementById('pricing-title'),
      pricingGrid: document.getElementById('pricing-grid'),
      valueStackLabel: document.getElementById('value-stack-label'),
      valueStackTitle: document.getElementById('value-stack-title'),
      valueStackSubtitle: document.getElementById('value-stack-subtitle'),
      valueStackRows: document.getElementById('value-stack-rows'),
      vsTotalLabel: document.getElementById('vs-total-label'),
      vsTotalUsd: document.getElementById('vs-total-usd'),
      vsTotalAzn: document.getElementById('vs-total-azn'),
      vsDisclaimer: document.getElementById('vs-disclaimer'),
      vsLabel: document.getElementById('vs-label'),
      vsOldLabel: document.getElementById('vs-old-label'),
      vsOldPrice: document.getElementById('vs-old-price'),
      vsNewLabel: document.getElementById('vs-new-label'),
      vsNewPrice: document.getElementById('vs-new-price'),
      vsNewSub: document.getElementById('vs-new-sub'),
      vsBadgeText: document.getElementById('vs-badge-text'),
      faqTitle: document.getElementById('faq-title'),
      faqList: document.getElementById('faq-list'),
      finalCtaTitle: document.getElementById('final-cta-title'),
      finalCtaBody: document.getElementById('final-cta-body'),
      finalCtaPrimary: document.getElementById('final-cta-primary'),
      finalCtaNotice: document.getElementById('final-cta-notice'),
      footerTagline: document.getElementById('footer-tagline'),
      footerNavList: document.getElementById('footer-nav-list'),
      footerLegalList: document.getElementById('footer-legal-list'),
      footerCopyright: document.getElementById('footer-copyright'),
      siteHeader: document.getElementById('site-header'),
    };

    let state = {
      locale: null,
      theme: null,
      messages: null,
    };

    // ── Header scroll shadow ─────────────────────────────────────────
    const headerObserver = new IntersectionObserver(
      ([entry]) => {
        dom.siteHeader.classList.toggle('scrolled', !entry.isIntersecting);
      },
      { threshold: 0 }
    );
    const sentinel = document.createElement('div');
    sentinel.style.cssText = 'position:absolute;top:0;height:1px;width:1px;pointer-events:none';
    document.body.prepend(sentinel);
    headerObserver.observe(sentinel);

    // ── Reveal on scroll ────────────────────────────────────────────
    const revealObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            revealObserver.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
    );

    function observeRevealElements() {
      document.querySelectorAll('.reveal').forEach((el) => {
        revealObserver.observe(el);
      });
    }

    function getInitialTheme() {
      const stored = localStorage.getItem(STORAGE_KEYS.theme);
      if (stored === 'light' || stored === 'dark') return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function getInitialLocale() {
      const stored = localStorage.getItem(STORAGE_KEYS.locale);
      if (SUPPORTED_LOCALES.includes(stored)) return stored;
      return 'az';
    }

    function applyTheme(theme) {
      state.theme = theme;
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem(STORAGE_KEYS.theme, theme);
    }

    function renderNav(items) {
      dom.navLinks.innerHTML = items
        .map((item) => `<li><a href="${item.href}">${item.label}</a></li>`)
        .join('');
    }

    function renderHero(messages) {
      dom.heroKicker.textContent = messages.hero.kicker;
      dom.heroHeadline.textContent = messages.hero.headline;
      dom.heroSubheadline.textContent = messages.hero.subheadline;

      dom.statsBar.innerHTML = messages.hero.stats.map(stat => `
        <div class="stat-item">
          <span class="stat-value">${stat.value}</span>
          <span class="stat-label">${stat.label}</span>
        </div>
      `).join('');

      // Visual flow cards — 3 columns representing the transformation
      dom.heroVisualCards.innerHTML = messages.hero.visualCards
        .map(
          (item, i) => `
              <article class="visual-flow-card">
                <div class="vfc-label">${String(i + 1).padStart(2, '0')} / ${item.title}</div>
                <div class="vfc-body">${item.body}</div>
                <div class="vfc-dots">
                  <span class="vfc-dot ${i === 0 ? 'active' : ''}"></span>
                  <span class="vfc-dot ${i === 1 ? 'active' : ''}"></span>
                  <span class="vfc-dot ${i === 2 ? 'active' : ''}"></span>
                </div>
              </article>
            `,
        )
        .join('');
    }

    function renderPanels(container, items) {
      container.innerHTML = items
        .map(
          (item, index) => `
              <article class="panel reveal">
                <div class="panel-index">${String(index + 1).padStart(2, '0')}</div>
                <h3 class="panel-title">${item.title}</h3>
                <p class="panel-copy">${item.body}</p>
              </article>
            `,
        )
        .join('');
    }

    function renderParagraphs(container, items) {
      container.innerHTML = items.map((item) => `<p>${item}</p>`).join('');
    }

    function renderBulletList(container, items) {
      container.innerHTML = items.map((item) => `<li>${item}</li>`).join('');
    }

    function renderModelTeaser(teaser) {
      dom.modelTeaserTitle.textContent = teaser.title;
      dom.modelTeaserSubtitle.textContent = teaser.subtitle;
      dom.modelTeaserCta.textContent = teaser.cta;
      
      renderBulletList(dom.modelTeaserBullets, teaser.bullets);
      
      dom.teaserCard1Title.textContent = teaser.card1.title;
      dom.teaserCard1Desc.textContent = teaser.card1.desc;
      dom.teaserCard1Badge.textContent = teaser.card1.badge;
      
      dom.teaserCard2Title.textContent = teaser.card2.title;
      dom.teaserCard2Desc.textContent = teaser.card2.desc;
      dom.teaserCard2Badge.textContent = teaser.card2.badge;
    }

    function renderValueStack(vs) {
      dom.valueStackLabel.textContent = vs.label;
      dom.valueStackTitle.textContent = vs.title;
      dom.valueStackSubtitle.textContent = vs.subtitle;

      dom.valueStackRows.innerHTML = vs.services.map(s => `
        <div class="vst-row">
          <div class="vst-name">
            ${s.name}
            <span class="vst-provider">${s.provider}</span>
          </div>
          <span class="vst-price-usd">${s.priceUSD}${vs.perMonth}</span>
          <span class="vst-price-azn">${s.priceAZN}</span>
        </div>
      `).join('');

      dom.vsTotalLabel.textContent = vs.totalLabel;
      dom.vsTotalUsd.textContent = vs.totalUSD;
      dom.vsTotalAzn.textContent = vs.totalAZN;
      dom.vsDisclaimer.textContent = vs.disclaimer;

      dom.vsLabel.textContent = vs.vsLabel;
      dom.vsOldLabel.textContent = vs.totalLabel;
      dom.vsOldPrice.textContent = vs.totalAZN;
      dom.vsNewLabel.textContent = vs.logitakaLabel;
      dom.vsNewPrice.textContent = vs.logitakaPrice;
      dom.vsNewSub.textContent = vs.perMonth;
      dom.vsBadgeText.textContent = vs.logitakaLabel;
    }

    function renderPricing(pricing) {
      dom.pricingGrid.innerHTML = pricing.cards
        .map(
          (card, index) => {
            const isCustom = index === pricing.cards.length - 1;
            const betaHtml = !isCustom
              ? `<p class="pricing-beta-note">${pricing.betaNote}</p>`
              : '';
            const btnClass = index === 1 ? 'button button-solid' : 'button button-ghost';
            return `
              <article class="pricing-card ${index === 1 ? 'is-featured' : ''} reveal">
                <span class="pricing-badge">${pricing.popularBadge}</span>
                <div class="panel-index">${card.label}</div>
                <h3 class="pricing-name">${card.name}</h3>
                <p class="pricing-price">${card.price}</p>
                <p class="pricing-copy">${card.body}</p>
                <div class="pricing-card-footer">
                  ${betaHtml}
                  <a class="${btnClass}" href="${card.href || '#final-cta'}">${card.cta}</a>
                </div>
              </article>
            `;
          },
        )
        .join('');
    }

    function renderFaq(items) {
      dom.faqList.innerHTML = items
        .map(
          (item, index) => `
              <details class="faq-item" ${index === 0 ? 'open' : ''}>
                <summary>
                  <span>${item.question}</span>
                  <span class="faq-toggle" aria-hidden="true">+</span>
                </summary>
                <div class="faq-answer">${item.answer}</div>
              </details>
            `,
        )
        .join('');
    }

    function renderLanguageSwitcher(activeLocale) {
      dom.languageSwitcher.innerHTML = SUPPORTED_LOCALES.map((locale) => {
        const label = locale.toUpperCase();
        const active = locale === activeLocale ? 'is-active' : '';
        return `<button class="control-button ${active}" type="button" data-locale="${locale}">${label}</button>`;
      }).join('');

      dom.languageSwitcher.querySelectorAll('[data-locale]').forEach((button) => {
        button.addEventListener('click', () => loadLocale(button.getAttribute('data-locale')));
      });
    }

    function render(messages) {
      state.messages = messages;
      document.documentElement.lang = state.locale;
      document.title = messages.meta.title;
      document
        .querySelector('meta[name="description"]')
        .setAttribute('content', messages.meta.description);

      renderNav(messages.ui.nav);
      renderLanguageSwitcher(state.locale);
      applyTheme(state.theme || getInitialTheme());

      dom.brandTagline1.textContent = messages.ui.brandTagline;
      dom.brandTagline2.textContent = messages.ui.brandTagline;

      renderHero(messages);

      dom.problemTitle.textContent = messages.problem.title;
      renderPanels(dom.problemGrid, messages.problem.items);
      dom.problemClosing.textContent = messages.problem.closing;

      dom.transformationTitle.textContent = messages.transformation.title;
      dom.transformationBody1.textContent = messages.transformation.body[0];
      dom.transformationBody2.textContent = messages.transformation.body[1];
      dom.transformationCoreLabel.textContent = messages.transformation.coreLabel;
      dom.transformationCoreBody.textContent = messages.transformation.coreBody;
      dom.transformationListLabel.textContent = messages.transformation.listLabel;
      renderBulletList(dom.transformationList, messages.transformation.list);

      dom.capabilitiesTitle.textContent = messages.capabilities.title;
      renderPanels(dom.capabilitiesGrid, messages.capabilities.items);
      dom.capabilitiesClosing.textContent = messages.capabilities.closing;

      dom.contextLabel.textContent = messages.context.label;
      dom.contextTitle.textContent = messages.context.title;
      renderParagraphs(dom.contextCopy, messages.context.body);
      dom.contextClosing.textContent = messages.context.closing;
      dom.contextModelsLabel.textContent = messages.context.modelsLabel;
      dom.contextModels.textContent = messages.context.models.join(', ');
      
      renderModelTeaser(messages.modelTeaser);

      if (messages.ui.imagePlaceholders.context.match(/\.(png|jpg|jpeg|svg|webp)$/i)) {
        dom.contextVisualPlaceholder.innerHTML = `<img src="${messages.ui.imagePlaceholders.context}" alt="" style="width: 100%; height: auto; display: block;">`;
        dom.contextVisualPlaceholder.style.padding = '0';
      } else {
        dom.contextVisualPlaceholder.textContent = messages.ui.imagePlaceholders.context;
        dom.contextVisualPlaceholder.style.padding = '16px';
      }

      dom.audienceTitle.textContent = messages.audience.title;
      renderPanels(dom.audienceGrid, messages.audience.items);
      dom.audienceClosing.textContent = messages.audience.closing;

      dom.devTeamLabel.textContent = messages.devTeam.label;
      dom.devTeamTitle.textContent = messages.devTeam.title;
      renderParagraphs(dom.devTeamCopy, messages.devTeam.body);
      dom.devTeamClosing.textContent = messages.devTeam.closing;
      dom.devTeamVisualLabel.textContent = messages.devTeam.visualLabel;
      renderBulletList(dom.devTeamPoints, messages.devTeam.points);
      if (messages.ui.imagePlaceholders.dev.match(/\.(png|jpg|jpeg|svg|webp)$/i)) {
        dom.devTeamVisualSlot.innerHTML = `<img src="${messages.ui.imagePlaceholders.dev}" alt="" style="width: 100%; height: auto; display: block;">`;
        dom.devTeamVisualSlot.style.border = 'none';
        dom.devTeamVisualSlot.style.background = 'transparent';
      } else {
        dom.devTeamVisualSlot.textContent = messages.ui.imagePlaceholders.dev;
      }


      dom.pricingTitle.textContent = messages.pricing.title;
      renderPricing(messages.pricing);

      renderValueStack(messages.valueStack);

      dom.faqTitle.textContent = messages.faq.title;
      renderFaq(messages.faq.items);

      dom.finalCtaTitle.textContent = messages.finalCta.title;
      dom.finalCtaBody.textContent = messages.finalCta.body;
      dom.finalCtaPrimary.textContent = messages.finalCta.primary;
      dom.finalCtaNotice.innerHTML = messages.finalCta.notice;

      dom.footerTagline.textContent = messages.footer.tagline;
      dom.footerCopyright.textContent = messages.footer.copyright;
      dom.footerNavList.innerHTML = messages.footer.nav
        .map((item) => `<li><a href="${item.href}">${item.label}</a></li>`)
        .join('');
      dom.footerLegalList.innerHTML = messages.footer.legal
        .map((item) => `<li><a href="${item.href}">${item.label}</a></li>`)
        .join('');

      // Trigger reveal observers after render
      requestAnimationFrame(() => observeRevealElements());
    }

    async function loadLocale(locale) {
      const targetLocale = SUPPORTED_LOCALES.includes(locale) ? locale : 'az';
      const response = await fetch(`./locales/${targetLocale}.json`, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Failed to load locale: ${targetLocale}`);
      }

      const messages = await response.json();
      state.locale = targetLocale;
      localStorage.setItem(STORAGE_KEYS.locale, targetLocale);
      render(messages);
    }

    dom.themeToggle.addEventListener('click', () => {
      applyTheme(state.theme === 'dark' ? 'light' : 'dark');
    });

    (async function init() {
      state.theme = getInitialTheme();
      try {
        await loadLocale(getInitialLocale());
      } catch (error) {
        console.error(error);
          await loadLocale('az');
      }
    })();
  </script>
</body>

</html>
