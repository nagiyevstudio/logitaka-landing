<!doctype html>
<html lang="az">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logitaka</title>
  <link rel="icon" type="image/svg+xml" href="../assets/logo-logitaka-bb.svg" />
  <meta name="description"
    content="Logitaka turns scattered inputs into a coherent system that becomes more useful as the pieces come together." />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://logitaka.com/" />
  <meta property="og:title" content="Logitaka — AI-Powered Operating System" />
  <meta property="og:description" content="Logitaka turns scattered inputs into a coherent system that becomes more useful as the pieces come together." />
  <meta property="og:image" content="https://logitaka.com/assets/logo-logitaka-bb.svg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://logitaka.com/" />
  <meta property="twitter:title" content="Logitaka — AI-Powered Operating System" />
  <meta property="twitter:description" content="Logitaka turns scattered inputs into a coherent system that becomes more useful as the pieces come together." />
  <meta property="twitter:image" content="https://logitaka.com/assets/logo-logitaka-bb.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="alternate" hreflang="az" href="https://logitaka.com/az/index.html" />
  <link rel="alternate" hreflang="en" href="https://logitaka.com/en/index.html" />
  <link rel="alternate" hreflang="ru" href="https://logitaka.com/ru/index.html" />
  <link rel="alternate" hreflang="x-default" href="https://logitaka.com/index.html" />
</head>

<body data-theme="dark">
  <div class="site-shell">
    <header class="site-header" id="site-header">
      <div class="header-inner">
        <a class="brand" href="#hero" aria-label="Logitaka">
          <img class="brand-logo brand-logo-dark" src="../assets/logo-logitaka-bb.svg" alt="Logitaka" height="28">
          <img class="brand-logo brand-logo-light" src="../assets/logo-logitaka-wb.svg" alt="Logitaka" height="28">
          <span class="brand-name-group">
            <span class="brand-name">Logitaka</span>
            <span class="brand-tagline" id="brand-tagline-1"></span>
          </span>
        </a>

        <nav class="header-nav" aria-label="Primary">
          <ul class="header-nav-list" id="nav-links"></ul>
        </nav>

      </div>
    </header>

    <main>
      <!-- HERO -->
      <section class="hero" id="hero">
        <div class="section-inner">
          <div class="hero-content">
            <div class="hero-eyebrow">
              <span class="hero-eyebrow-dot" aria-hidden="true"></span>
              <span id="hero-kicker"></span>
            </div>
            <h1 class="hero-headline" id="hero-headline"></h1>
            <p class="hero-subheadline" id="hero-subheadline"></p>
          </div>

          <!-- Stats bar -->
          <div class="stats-bar" id="stats-bar"></div>

          <!-- Visual flow panel -->
          <div class="hero-visual-panel">
            <div class="hero-visual-inner" id="hero-visual-cards"></div>
          </div>
        </div>
      </section>

      <!-- PROBLEM -->
      <section id="problem">
        <div class="section-inner">
          <div class="section-eyebrow">
            <span class="section-kicker">01</span>
            <span class="section-kicker-line" aria-hidden="true"></span>
          </div>
          <h2 class="section-title medium reveal" id="problem-title"></h2>
          <div class="cards-grid wide" id="problem-grid"></div>
          <p class="section-copy reveal" id="problem-closing"></p>
        </div>
      </section>

      <!-- HOW IT WORKS -->
      <section id="how-it-works">
        <div class="section-inner split-grid">
          <div class="section-text">
            <div class="section-eyebrow">
              <span class="section-kicker">02</span>
              <span class="section-kicker-line" aria-hidden="true"></span>
            </div>
            <h2 class="section-title medium reveal" id="transformation-title"></h2>
            <p class="reveal" id="transformation-body-1"></p>
            <p class="reveal" id="transformation-body-2"></p>
            <div class="quote-panel reveal">
              <div class="muted-label" id="transformation-core-label"></div>
              <p class="section-copy" id="transformation-core-body"></p>
            </div>
            <div class="quote-panel reveal">
              <div class="muted-label" id="transformation-list-label"></div>
              <ul class="bullet-list" id="transformation-list"></ul>
            </div>
          </div>
          <div class="transformation-visual-slot reveal" aria-hidden="true">
            <img src="../assets/visual1.png" alt="">
          </div>
        </div>
      </section>

      <!-- CAPABILITIES -->
      <section id="capabilities">
        <div class="section-inner">
          <div class="section-eyebrow">
            <span class="section-kicker">03</span>
            <span class="section-kicker-line" aria-hidden="true"></span>
          </div>
          <h2 class="section-title medium reveal" id="capabilities-title"></h2>
          <div class="cards-grid wide" id="capabilities-grid"></div>
          <p class="section-copy reveal" id="capabilities-closing"></p>
        </div>
      </section>

      <!-- CONTEXT -->
      <section id="context">
        <div class="section-inner split-grid">
          <div class="panel reveal">
            <div class="muted-label" id="context-label"></div>
            <h2 class="section-title medium" id="context-title"></h2>
            <div class="section-text" id="context-copy"></div>
            <p class="section-copy" id="context-closing"></p>
            <p class="context-models-line"><span class="muted-label" id="context-models-label"></span>&#8194;<span
                id="context-models"></span></p>
          </div>
          <div class="panel reveal">
            <div class="visual-placeholder" id="context-visual-placeholder"><img src="../assets/visual2.png" alt=""></div>
          </div>
        </div>
      </section>

      <!-- MODEL TEASER -->
      <section id="model-teaser">
        <div class="section-inner split-grid">
          <div class="section-text">
            <h2 class="section-title medium reveal" id="model-teaser-title"></h2>
            <p class="section-copy reveal" id="model-teaser-subtitle"></p>
            <ul class="bullet-list reveal" id="model-teaser-bullets"></ul>
            <div class="reveal">
              <a href="models.html" class="button button-solid" id="model-teaser-cta"></a>
            </div>
          </div>
          <div class="model-teaser-visual reveal">
            <div class="teaser-visual-arrow">↓</div>
            <article class="teaser-card teaser-card-light">
              <div class="teaser-card-title" id="teaser-card1-title"></div>
              <div class="teaser-card-desc" id="teaser-card1-desc"></div>
              <div class="teaser-card-badge" id="teaser-card1-badge"></div>
            </article>
            <article class="teaser-card teaser-card-dark">
              <div class="teaser-card-title" id="teaser-card2-title"></div>
              <div class="teaser-card-desc" id="teaser-card2-desc"></div>
              <div class="teaser-card-badge" id="teaser-card2-badge"></div>
            </article>
          </div>
        </div>
      </section>

      <!-- AUDIENCE -->
      <section id="audience">
        <div class="section-inner">
          <div class="section-eyebrow">
            <span class="section-kicker">04</span>
            <span class="section-kicker-line" aria-hidden="true"></span>
          </div>
          <h2 class="section-title medium reveal" id="audience-title"></h2>
          <div class="cards-grid wide" id="audience-grid"></div>
          <p class="section-copy reveal" id="audience-closing"></p>
        </div>
      </section>

      <!-- DEV TEAM -->
      <section id="dev-team">
        <div class="section-inner split-grid dev-team-grid">
          <div class="dev-team-visual-slot reveal" id="dev-team-visual-slot" aria-hidden="true"></div>
          <div class="section-text">
            <div class="panel reveal">
              <div class="muted-label" id="dev-team-label"></div>
              <h2 class="section-title medium" id="dev-team-title"></h2>
              <div class="section-text" id="dev-team-copy"></div>
              <p class="section-copy" id="dev-team-closing"></p>
            </div>
            <div class="quote-panel reveal">
              <div class="muted-label" id="dev-team-visual-label"></div>
              <ul class="bullet-list" id="dev-team-points"></ul>
            </div>
          </div>
        </div>
      </section>


      <!-- VALUE STACK -->
      <section id="value-stack">
        <div class="section-inner">
          <div class="section-eyebrow">
            <span class="section-kicker" id="value-stack-label"></span>
            <span class="section-kicker-line" aria-hidden="true"></span>
          </div>
          <h2 class="section-title medium reveal" id="value-stack-title"></h2>
          <p class="section-copy reveal" id="value-stack-subtitle"></p>
          <div class="value-stack-grid reveal">
            <div>
              <div class="value-stack-table">
                <div class="vst-header">
                  <span id="vs-col-service">Service</span>
                  <span>USD</span>
                  <span>AZN</span>
                </div>
                <div id="value-stack-rows"></div>
                <div class="vst-total-row">
                  <span class="vst-total-label" id="vs-total-label"></span>
                  <span class="vst-total-usd" id="vs-total-usd"></span>
                  <span class="vst-total-azn" id="vs-total-azn"></span>
                </div>
              </div>
              <p class="vst-disclaimer" id="vs-disclaimer"></p>
            </div>
            <div class="value-stack-panel">
              <div class="vsp-vs" id="vs-label"></div>
              <div class="vsp-savings">
                <div class="vsp-savings-old">
                  <span class="vsp-old-label" id="vs-old-label"></span>
                  <span class="vsp-old-price" id="vs-old-price"></span>
                </div>
                <div class="vsp-divider"></div>
                <div class="vsp-savings-new">
                  <span class="vsp-new-label" id="vs-new-label"></span>
                  <span class="vsp-new-price" id="vs-new-price"></span>
                  <span class="vsp-new-sub" id="vs-new-sub"></span>
                </div>
              </div>
              <div class="vsp-badge">
                <span class="vsp-badge-icon">&#10003;</span>
                <span id="vs-badge-text"></span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- PRICING -->
      <section id="pricing">
        <div class="section-inner">
          <div class="section-eyebrow">
            <span class="section-kicker">05</span>
            <span class="section-kicker-line" aria-hidden="true"></span>
          </div>
          <h2 class="section-title medium reveal" id="pricing-title"></h2>
          <div class="pricing-grid" id="pricing-grid"></div>
        </div>
      </section>

      <!-- FAQ -->
      <section id="faq">
        <div class="section-inner">
          <div class="section-eyebrow">
            <span class="section-kicker">06</span>
            <span class="section-kicker-line" aria-hidden="true"></span>
          </div>
          <h2 class="section-title medium reveal" id="faq-title"></h2>
          <div class="faq-list" id="faq-list"></div>
        </div>
      </section>

      <!-- FINAL CTA -->
      <section id="final-cta">
        <div class="section-inner">
          <div class="cta-panel reveal">
            <div class="section-text">
              <h2 class="section-title medium" id="final-cta-title"></h2>
              <p id="final-cta-body"></p>
            </div>
            <div class="cta-actions">
              <a class="button button-solid" href="#" id="final-cta-primary"></a>
              <p class="cta-notice" id="final-cta-notice"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-top">
          <div class="footer-brand">
            <a class="brand" href="#hero" aria-label="Logitaka">
              <img class="brand-logo brand-logo-dark" src="../assets/logo-logitaka-bb.svg" alt="Logitaka" height="28">
              <img class="brand-logo brand-logo-light" src="../assets/logo-logitaka-wb.svg" alt="Logitaka" height="28">
              <span class="brand-name-group">
                <span class="brand-name">Logitaka</span>
                <span class="brand-tagline" id="brand-tagline-2"></span>
              </span>
            </a>
            <p class="footer-tagline" id="footer-tagline"></p>
          </div>
          <nav class="footer-nav" aria-label="Footer navigation">
            <ul id="footer-nav-list"></ul>
          </nav>
          <div class="footer-right">
            <ul class="footer-legal-list" id="footer-legal-list"></ul>
            <div class="footer-controls">
              <div id="language-switcher" aria-label="Language"></div>
              <button class="theme-icon-btn" id="theme-toggle" type="button" aria-label="Toggle theme">
                <span class="theme-icon-sun" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="square">
                    <circle cx="12" cy="12" r="4" />
                    <line x1="12" y1="2" x2="12" y2="4" />
                    <line x1="12" y1="20" x2="12" y2="22" />
                    <line x1="2" y1="12" x2="4" y2="12" />
                    <line x1="20" y1="12" x2="22" y2="12" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                  </svg>
                </span>
                <span class="theme-icon-moon" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="square">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                  </svg>
                </span>
              </button>
            </div>
          </div>
        </div>
        <div class="footer-bottom">
          <span id="footer-copyright"></span>
        </div>
      </div>
    </footer>
  </div>

  <script src="../js/i18n.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/index.js"></script>
</body>

</html>
